# Render Blueprint - Free hosting for Cafe Management System
# Deploy: Push to GitHub, connect repo at https://dashboard.render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: cafe-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && npm run start
    healthCheckPath: /api/menu
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://cafe-frontend-m4d9.onrender.com

  # Frontend (Static Site)
  - type: web
    name: cafe-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /order
        destination: /index.html
      - type: rewrite
        source: /order/*
        destination: /index.html
      - type: rewrite
        source: /manager
        destination: /index.html
      - type: rewrite
        source: /manager/*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cafe-backend-hzy6.onrender.com

databases:
  - name: cafe-db
    databaseName: cafe
    user: cafe
    plan: free
    region: oregon
